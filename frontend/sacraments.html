<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacraments - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .sacrament-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            border-left: 4px solid #667eea;
        }
        .modal-content {
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <h2>Sacramental Records</h2>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sacramentModal" onclick="resetForm()">
                    <i class="fas fa-plus"></i> Add Sacrament
                </button>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <div class="input-group mb-3">
                    <select id="sacramentTypeFilter" class="form-select" style="max-width: 200px;">
                        <option value="">All Types</option>
                        <option value="Baptism">Baptism</option>
                        <option value="Confirmation">Confirmation</option>
                        <option value="First Communion">First Communion</option>
                        <option value="Marriage">Marriage</option>
                        <option value="Last Rites">Last Rites</option>
                    </select>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by member name...">
                    <button class="btn btn-primary" onclick="loadSacraments()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <div id="sacramentsList" class="row"></div>
    </div>

    <!-- Add/Edit Sacrament Modal -->
    <div class="modal fade" id="sacramentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Sacrament</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="sacramentForm">
                        <input type="hidden" id="sacramentId">
                        <div class="mb-3">
                            <label class="form-label">Member *</label>
                            <select id="memberId" class="form-select" required>
                                <option value="">Select Member</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sacrament Type *</label>
                            <select id="sacramentType" class="form-select" required onchange="toggleFields()">
                                <option value="">Select Type</option>
                                <option value="Baptism">Baptism</option>
                                <option value="Confirmation">Confirmation</option>
                                <option value="First Communion">First Holy Communion</option>
                                <option value="Marriage">Marriage</option>
                                <option value="Last Rites">Last Rites</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date Received *</label>
                            <input type="date" id="dateReceived" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Officiant (Priest/Bishop) *</label>
                            <input type="text" id="officiant" class="form-control" required>
                        </div>
                        <div id="baptismFields" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Godfather</label>
                                <input type="text" id="godfather" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Godmother</label>
                                <input type="text" id="godmother" class="form-control">
                            </div>
                        </div>
                        <div id="confirmationFields" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Confirmation Name</label>
                                <input type="text" id="confirmationName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sponsor</label>
                                <input type="text" id="sponsor" class="form-control">
                            </div>
                        </div>
                        <div id="marriageFields" style="display: none;">
                            <div class="mb-3">
                                <label class="form-label">Spouse Name</label>
                                <input type="text" id="spouseName" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Witnesses (one per line)</label>
                                <textarea id="witnesses" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea id="notes" class="form-control" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveSacrament()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentFilter = '';
        let currentSearch = '';
        
        async function loadMembers() {
            try {
                const response = await fetch('/api/members/');
                if (response.ok) {
                    const members = await response.json();
                    const select = document.getElementById('memberId');
                    select.innerHTML = '<option value="">Select Member</option>' + 
                        members.map(m => `<option value="${m.id}">${m.full_name}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }
        
        async function loadSacraments() {
            currentFilter = document.getElementById('sacramentTypeFilter').value;
            currentSearch = document.getElementById('searchInput').value;
            
            let url = '/api/sacraments/';
            const params = [];
            if (currentFilter) params.push(`sacrament_type=${currentFilter}`);
            if (currentSearch) params.push(`member__first_name__icontains=${currentSearch}&member__last_name__icontains=${currentSearch}`);
            if (params.length) url += '?' + params.join('&');
            
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const sacraments = await response.json();
                    renderSacraments(sacraments);
                }
            } catch (error) {
                console.error('Error loading sacraments:', error);
            }
        }
        
        function renderSacraments(sacraments) {
            const container = document.getElementById('sacramentsList');
            if (sacraments.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">No sacraments found</div>';
                return;
            }
            
            container.innerHTML = sacraments.map(sac => `
                <div class="col-md-6">
                    <div class="sacrament-card">
                        <h5>${sac.sacrament_type}</h5>
                        <p><strong>Member:</strong> ${sac.member_name || sac.member}</p>
                        <p><strong>Date:</strong> ${sac.date_received}</p>
                        <p><strong>Officiant:</strong> ${sac.officiant}</p>
                        ${sac.godfather ? `<p><strong>Godfather:</strong> ${sac.godfather}</p>` : ''}
                        ${sac.godmother ? `<p><strong>Godmother:</strong> ${sac.godmother}</p>` : ''}
                        ${sac.confirmation_name ? `<p><strong>Confirmation Name:</strong> ${sac.confirmation_name}</p>` : ''}
                        ${sac.spouse_name ? `<p><strong>Spouse:</strong> ${sac.spouse_name}</p>` : ''}
                        <div class="mt-2">
                            <button class="btn btn-sm btn-warning" onclick="editSacrament(${sac.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSacrament(${sac.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                            <button class="btn btn-sm btn-info" onclick="printSacrament(${sac.id})">
                                <i class="fas fa-print"></i> Print
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleFields() {
            const type = document.getElementById('sacramentType').value;
            document.getElementById('baptismFields').style.display = type === 'Baptism' ? 'block' : 'none';
            document.getElementById('confirmationFields').style.display = type === 'Confirmation' ? 'block' : 'none';
            document.getElementById('marriageFields').style.display = type === 'Marriage' ? 'block' : 'none';
        }
        
        function resetForm() {
            document.getElementById('sacramentForm').reset();
            document.getElementById('sacramentId').value = '';
            document.getElementById('modalTitle').textContent = 'Add Sacrament';
            toggleFields();
        }
        
        async function saveSacrament() {
            const sacramentData = {
                member: document.getElementById('memberId').value,
                sacrament_type: document.getElementById('sacramentType').value,
                date_received: document.getElementById('dateReceived').value,
                officiant: document.getElementById('officiant').value,
                godfather: document.getElementById('godfather').value,
                godmother: document.getElementById('godmother').value,
                confirmation_name: document.getElementById('confirmationName').value,
                sponsor: document.getElementById('sponsor').value,
                spouse_name: document.getElementById('spouseName').value,
                witnesses: document.getElementById('witnesses').value,
                notes: document.getElementById('notes').value
            };
            
            const id = document.getElementById('sacramentId').value;
            let response;
            
            try {
                if (id) {
                    response = await fetch(`/api/sacraments/${id}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(sacramentData)
                    });
                } else {
                    response = await fetch('/api/sacraments/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(sacramentData)
                    });
                }
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('sacramentModal')).hide();
                    loadSacraments();
                } else {
                    const error = await response.json();
                    alert('Error: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error saving sacrament:', error);
                alert('Error saving sacrament');
            }
        }
        
        async function editSacrament(id) {
            try {
                const response = await fetch(`/api/sacraments/${id}/`);
                if (response.ok) {
                    const sac = await response.json();
                    document.getElementById('sacramentId').value = sac.id;
                    document.getElementById('memberId').value = sac.member;
                    document.getElementById('sacramentType').value = sac.sacrament_type;
                    document.getElementById('dateReceived').value = sac.date_received;
                    document.getElementById('officiant').value = sac.officiant;
                    document.getElementById('godfather').value = sac.godfather || '';
                    document.getElementById('godmother').value = sac.godmother || '';
                    document.getElementById('confirmationName').value = sac.confirmation_name || '';
                    document.getElementById('sponsor').value = sac.sponsor || '';
                    document.getElementById('spouseName').value = sac.spouse_name || '';
                    document.getElementById('witnesses').value = sac.witnesses || '';
                    document.getElementById('notes').value = sac.notes || '';
                    document.getElementById('modalTitle').textContent = 'Edit Sacrament';
                    toggleFields();
                    
                    new bootstrap.Modal(document.getElementById('sacramentModal')).show();
                }
            } catch (error) {
                console.error('Error loading sacrament:', error);
            }
        }
        
        async function deleteSacrament(id) {
            if (confirm('Are you sure you want to delete this sacrament record?')) {
                try {
                    const response = await fetch(`/api/sacraments/${id}/`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        }
                    });
                    if (response.ok) {
                        loadSacraments();
                    } else {
                        alert('Error deleting sacrament');
                    }
                } catch (error) {
                    console.error('Error deleting sacrament:', error);
                }
            }
        }
        
        function printSacrament(id) {
            window.open(`/api/sacraments/${id}/`, '_blank');
        }
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        loadMembers();
        loadSacraments();
        
        document.getElementById('sacramentTypeFilter').addEventListener('change', loadSacraments);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadSacraments();
        });
    </script>
</body>
</html>
