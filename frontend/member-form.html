<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Form - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
            color: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <a href="/members/" class="btn btn-secondary mb-3">
                    <i class="fas fa-arrow-left"></i> Back to Members
                </a>
                <h2 id="formTitle">Add New Member</h2>
            </div>
        </div>

        <div class="form-container">
            <form id="memberForm">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Middle Name</label>
                        <input type="text" class="form-control" id="middleName">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Birth Date *</label>
                        <input type="date" class="form-control" id="birthDate" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Gender *</label>
                        <select class="form-select" id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="M">Male</option>
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Civil Status *</label>
                        <select class="form-select" id="civilStatus" required>
                            <option value="">Select Status</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Widowed">Widowed</option>
                            <option value="Divorced">Divorced</option>
                            <option value="Separated">Separated</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone *</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address *</label>
                    <textarea class="form-control" id="address" rows="3" required></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-submit">
                        <i class="fas fa-save"></i> Save Member
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const memberId = window.location.pathname.includes('/edit/') ? 
            window.location.pathname.split('/')[2] : null;
        
        if (memberId) {
            document.getElementById('formTitle').textContent = 'Edit Member';
            loadMemberData();
        }
        
        async function loadMemberData() {
            try {
                const response = await fetch(`/api/members/${memberId}/`);
                if (response.ok) {
                    const member = await response.json();
                    document.getElementById('firstName').value = member.first_name;
                    document.getElementById('middleName').value = member.middle_name || '';
                    document.getElementById('lastName').value = member.last_name;
                    document.getElementById('birthDate').value = member.birth_date;
                    document.getElementById('gender').value = member.gender;
                    document.getElementById('civilStatus').value = member.civil_status;
                    document.getElementById('email').value = member.email;
                    document.getElementById('phone').value = member.phone;
                    document.getElementById('address').value = member.address;
                }
            } catch (error) {
                console.error('Error loading member:', error);
            }
        }
        
        document.getElementById('memberForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const memberData = {
                first_name: document.getElementById('firstName').value,
                middle_name: document.getElementById('middleName').value,
                last_name: document.getElementById('lastName').value,
                birth_date: document.getElementById('birthDate').value,
                gender: document.getElementById('gender').value,
                civil_status: document.getElementById('civilStatus').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            try {
                let response;
                if (memberId) {
                    response = await fetch(`/api/members/${memberId}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(memberData)
                    });
                } else {
                    response = await fetch('/api/members/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(memberData)
                    });
                }
                
                if (response.ok) {
                    window.location.href = '/members/';
                } else {
                    const error = await response.json();
                    alert('Error: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error saving member:', error);
                alert('Error saving member');
            }
        });
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
