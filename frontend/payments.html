<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .payment-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <h2>Payment Records</h2>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#paymentModal" onclick="resetPaymentForm()">
                    <i class="fas fa-plus"></i> Record Payment
                </button>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <div class="input-group mb-3">
                    <select id="pledgeFilter" class="form-select" style="max-width: 300px;">
                        <option value="">All Pledges</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadPayments()">
                        <i class="fas fa-filter"></i> Filter
                    </button>
                </div>
            </div>
        </div>

        <div id="paymentsList" class="row"></div>
    </div>

    <!-- Payment Modal -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Record Payment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="paymentForm">
                        <input type="hidden" id="paymentId">
                        <div class="mb-3">
                            <label class="form-label">Select Pledge *</label>
                            <select id="pledgeSelect" class="form-select" required>
                                <option value="">Select Pledge</option>
                            </select>
                        </div>
                        <div id="pledgeInfo" class="alert alert-info" style="display: none;"></div>
                        <div class="mb-3">
                            <label class="form-label">Amount (₱) *</label>
                            <input type="number" id="paymentAmount" class="form-control" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Date *</label>
                            <input type="date" id="paymentDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Payment Method *</label>
                            <select id="paymentMethod" class="form-select" required>
                                <option value="Cash">Cash</option>
                                <option value="Check">Check</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Online">Online</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reference Number</label>
                            <input type="text" id="referenceNumber" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes</label>
                            <textarea id="paymentNotes" class="form-control" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="savePayment()">Save Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPledgeFilter = '';
        
        async function loadPledgesForSelect() {
            try {
                const response = await fetch('/api/pledges/');
                if (response.ok) {
                    const pledges = await response.json();
                    const select = document.getElementById('pledgeSelect');
                    const filter = document.getElementById('pledgeFilter');
                    
                    const options = pledges.map(p => `<option value="${p.id}" data-balance="${p.balance}" data-member="${p.member_name}">${p.member_name} - ₱${p.amount_promised} (Balance: ₱${p.balance})</option>`);
                    
                    select.innerHTML = '<option value="">Select Pledge</option>' + options.join('');
                    filter.innerHTML = '<option value="">All Pledges</option>' + options.join('');
                }
            } catch (error) {
                console.error('Error loading pledges:', error);
            }
        }
        
        async function loadPayments() {
            currentPledgeFilter = document.getElementById('pledgeFilter').value;
            
            let url = '/api/payments/';
            if (currentPledgeFilter) {
                url += `?pledge=${currentPledgeFilter}`;
            }
            
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const payments = await response.json();
                    renderPayments(payments);
                }
            } catch (error) {
                console.error('Error loading payments:', error);
            }
        }
        
        function renderPayments(payments) {
            const container = document.getElementById('paymentsList');
            if (payments.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">No payments recorded</div>';
                return;
            }
            
            container.innerHTML = payments.map(payment => `
                <div class="col-md-6">
                    <div class="payment-card">
                        <h5>Payment #${payment.id}</h5>
                        <p><strong>Pledge ID:</strong> ${payment.pledge}</p>
                        <p><strong>Amount:</strong> ₱${parseFloat(payment.amount).toLocaleString()}</p>
                        <p><strong>Date:</strong> ${payment.payment_date}</p>
                        <p><strong>Method:</strong> ${payment.payment_method}</p>
                        ${payment.reference_number ? `<p><strong>Reference:</strong> ${payment.reference_number}</p>` : ''}
                        ${payment.notes ? `<p><strong>Notes:</strong> ${payment.notes}</p>` : ''}
                        <div class="mt-2">
                            <button class="btn btn-sm btn-danger" onclick="deletePayment(${payment.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function resetPaymentForm() {
            document.getElementById('paymentForm').reset();
            document.getElementById('paymentId').value = '';
            document.getElementById('pledgeInfo').style.display = 'none';
            
            // Set default date to today
            document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];
        }
        
        document.getElementById('pledgeSelect').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            const balance = selected.getAttribute('data-balance');
            const member = selected.getAttribute('data-member');
            
            if (balance && member) {
                const info = document.getElementById('pledgeInfo');
                info.innerHTML = `<strong>${member}</strong><br>Remaining Balance: ₱${parseFloat(balance).toLocaleString()}`;
                info.style.display = 'block';
                
                // Set max amount to balance
                document.getElementById('paymentAmount').max = balance;
                document.getElementById('paymentAmount').placeholder = `Max: ₱${parseFloat(balance).toLocaleString()}`;
            } else {
                document.getElementById('pledgeInfo').style.display = 'none';
            }
        });
        
        async function savePayment() {
            const paymentData = {
                pledge: document.getElementById('pledgeSelect').value,
                amount: document.getElementById('paymentAmount').value,
                payment_date: document.getElementById('paymentDate').value,
                payment_method: document.getElementById('paymentMethod').value,
                reference_number: document.getElementById('referenceNumber').value,
                notes: document.getElementById('paymentNotes').value
            };
            
            if (!paymentData.pledge || !paymentData.amount || !paymentData.payment_date) {
                alert('Please fill in all required fields');
                return;
            }
            
            try {
                const response = await fetch('/api/payments/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(paymentData)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                    loadPayments();
                    alert('Payment recorded successfully!');
                } else {
                    const error = await response.json();
                    alert('Error: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error saving payment:', error);
                alert('Error saving payment');
            }
        }
        
        async function deletePayment(id) {
            if (confirm('Are you sure you want to delete this payment record?')) {
                try {
                    const response = await fetch(`/api/payments/${id}/`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        }
                    });
                    if (response.ok) {
                        loadPayments();
                    } else {
                        alert('Error deleting payment');
                    }
                } catch (error) {
                    console.error('Error deleting payment:', error);
                }
            }
        }
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Check URL params for pledge filter
        const urlParams = new URLSearchParams(window.location.search);
        const pledgeParam = urlParams.get('pledge');
        if (pledgeParam) {
            setTimeout(() => {
                document.getElementById('pledgeFilter').value = pledgeParam;
                loadPayments();
            }, 500);
        }
        
        loadPledgesForSelect();
        loadPayments();
    </script>
</body>
</html>
