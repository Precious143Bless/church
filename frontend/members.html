<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard/">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/members/">
                            <i class="fas fa-users"></i> Members
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sacraments/">
                            <i class="fas fa-cross"></i> Sacraments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pledges/">
                            <i class="fas fa-hand-holding-heart"></i> Pledges
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/payments/">
                            <i class="fas fa-money-bill-wave"></i> Payments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports/">
                            <i class="fas fa-chart-bar"></i> Reports
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm ms-3" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <h2>Church Members</h2>
            </div>
            <div class="col-md-4 text-end">
                <a href="/members/add/" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add New Member
                </a>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <div class="input-group mb-3">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by name, email, or phone...">
                    <button class="btn btn-primary" onclick="searchMembers()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Civil Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="membersTableBody">
                            <tr>
                                <td colspan="5" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSearch = '';
        
        async function loadMembers() {
            try {
                const url = currentSearch ? `/api/members/?search=${currentSearch}` : '/api/members/';
                const response = await fetch(url);
                if (response.ok) {
                    const members = await response.json();
                    renderMembers(members);
                } else if (response.status === 401) {
                    window.location.href = '/login/';
                }
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }
        
        function renderMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            if (members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No members found</td></tr>';
                return;
            }
            
            tbody.innerHTML = members.map(member => `
                <tr>
                    <td><strong>${member.full_name}</strong></td>
                    <td>${member.email}</td>
                    <td>${member.phone}</td>
                    <td>${member.civil_status}</td>
                    <td>
                        <a href="/members/${member.id}/" class="btn btn-sm btn-info">
                            <i class="fas fa-eye"></i> View
                        </a>
                        <a href="/members/${member.id}/edit/" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function searchMembers() {
            currentSearch = document.getElementById('searchInput').value;
            loadMembers();
        }
        
        async function deleteMember(id) {
            if (confirm('Are you sure you want to delete this member? This will also delete all related records.')) {
                try {
                    const response = await fetch(`/api/members/${id}/`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        }
                    });
                    if (response.ok) {
                        loadMembers();
                    } else {
                        alert('Error deleting member');
                    }
                } catch (error) {
                    console.error('Error deleting member:', error);
                }
            }
        }
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        loadMembers();
        
        // Add enter key search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchMembers();
            }
        });
    </script>
</body>
</html>
