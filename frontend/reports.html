<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .report-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .btn-report {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Reports & Analytics</h2>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="report-card">
                    <h5>Member Statistics</h5>
                    <canvas id="memberChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="report-card">
                    <h5>Financial Summary</h5>
                    <div id="financialSummary"></div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="report-card">
                    <h5>Generate Custom Report</h5>
                    <div class="row">
                        <div class="col-md-3">
                            <select id="reportType" class="form-select">
                                <option value="members">Members List</option>
                                <option value="sacraments">Sacraments Report</option>
                                <option value="financial">Financial Report</option>
                            </select>
                        </div>
                        <div class="col-md-3" id="dateRangeDiv" style="display: none;">
                            <input type="date" id="startDate" class="form-control" placeholder="Start Date">
                        </div>
                        <div class="col-md-3" id="dateRangeEndDiv" style="display: none;">
                            <input type="date" id="endDate" class="form-control" placeholder="End Date">
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-report" onclick="generateReport()">
                                <i class="fas fa-download"></i> Generate Report
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="report-card">
                    <h5>Report Results</h5>
                    <div id="reportResults" class="table-responsive">
                        <p class="text-muted">Select a report type and click Generate</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let memberChart = null;
        
        async function loadDashboardData() {
            try {
                const response = await fetch('/api/dashboard-stats/');
                if (response.ok) {
                    const data = await response.json();
                    
                    // Update member chart
                    const ctx = document.getElementById('memberChart').getContext('2d');
                    if (memberChart) memberChart.destroy();
                    
                    memberChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.sacrament_counts.map(s => s.sacrament_type),
                            datasets: [{
                                label: 'Number of Sacraments',
                                data: data.sacrament_counts.map(s => s.count),
                                backgroundColor: 'rgba(102, 126, 234, 0.5)',
                                borderColor: 'rgba(102, 126, 234, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: { stepSize: 1 }
                                }
                            }
                        }
                    });
                    
                    // Update financial summary
                    document.getElementById('financialSummary').innerHTML = `
                        <div class="row">
                            <div class="col-md-6">
                                <div class="alert alert-info">
                                    <strong>Total Members</strong><br>
                                    <h3>${data.total_members}</h3>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="alert alert-warning">
                                    <strong>Outstanding Pledges</strong><br>
                                    <h3>₱${data.outstanding_pledges.toLocaleString()}</h3>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="alert alert-success">
                                    <strong>Total Pledges</strong><br>
                                    <h3>${data.total_pledges}</h3>
                                </div>
                            </div>
                            <div class="col-md-6 mt-2">
                                <div class="alert alert-primary">
                                    <strong>Total Sacraments</strong><br>
                                    <h3>${data.total_sacraments}</h3>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }
        
        document.getElementById('reportType').addEventListener('change', function() {
            const showDates = this.value === 'sacraments' || this.value === 'financial';
            document.getElementById('dateRangeDiv').style.display = showDates ? 'block' : 'none';
            document.getElementById('dateRangeEndDiv').style.display = showDates ? 'block' : 'none';
        });
        
        async function generateReport() {
            const reportType = document.getElementById('reportType').value;
            let url = `/api/reports/?type=${reportType}`;
            
            if (reportType === 'sacraments' || reportType === 'financial') {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                if (startDate) url += `&start_date=${startDate}`;
                if (endDate) url += `&end_date=${endDate}`;
            }
            
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    renderReport(reportType, data);
                } else {
                    alert('Error generating report');
                }
            } catch (error) {
                console.error('Error generating report:', error);
            }
        }
        
        function renderReport(type, data) {
            const container = document.getElementById('reportResults');
            
            if (type === 'members') {
                if (data.length === 0) {
                    container.innerHTML = '<p>No members found</p>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Civil Status</th>
                                <th>Birth Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(m => `
                                <tr>
                                    <td>${m.full_name}</td>
                                    <td>${m.email}</td>
                                    <td>${m.phone}</td>
                                    <td>${m.civil_status}</td>
                                    <td>${m.birth_date}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <button class="btn btn-success mt-3" onclick="printReport()">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                `;
            } else if (type === 'sacraments') {
                if (data.length === 0) {
                    container.innerHTML = '<p>No sacraments found in this period</p>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Member</th>
                                <th>Sacrament Type</th>
                                <th>Date Received</th>
                                <th>Officiant</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(s => `
                                <tr>
                                    <td>${s.member_name || s.member}</td>
                                    <td>${s.sacrament_type}</td>
                                    <td>${s.date_received}</td>
                                    <td>${s.officiant}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <button class="btn btn-success mt-3" onclick="printReport()">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                `;
            } else if (type === 'financial') {
                container.innerHTML = `
                    <div class="alert alert-info">
                        <h4>Financial Summary</h4>
                        <p><strong>Total Collected:</strong> ₱${(data.total_collected || 0).toLocaleString()}</p>
                        <p><strong>Total Pledged:</strong> ₱${(data.total_pledged || 0).toLocaleString()}</p>
                        <p><strong>Collection Rate:</strong> ${data.total_pledged ? ((data.total_collected / data.total_pledged) * 100).toFixed(2) : 0}%</p>
                    </div>
                    <h5>Payment Details</h5>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Reference</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.payments ? data.payments.map(p => `
                                <tr>
                                    <td>${p.payment_date}</td>
                                    <td>₱${parseFloat(p.amount).toLocaleString()}</td>
                                    <td>${p.payment_method}</td>
                                    <td>${p.reference_number || '-'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="4">No payments found</td></tr>'}
                        </tbody>
                    </table>
                    <button class="btn btn-success mt-3" onclick="printReport()">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                `;
            }
        }
        
        function printReport() {
            const reportContent = document.getElementById('reportResults').innerHTML;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                    <head>
                        <title>Church Registry Report</title>
                        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                        <style>
                            body { padding: 20px; }
                            @media print {
                                button { display: none; }
                            }
                        </style>
                    </head>
                    <body>
                        <h2>Church Registry System Report</h2>
                        <p>Generated on: ${new Date().toLocaleString()}</p>
                        <hr>
                        ${reportContent}
                    </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        loadDashboardData();
    </script>
</body>
</html>
