<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pledges - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .pledge-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-Unpaid { background: #ffc107; color: #856404; }
        .status-Partially\\ Paid { background: #17a2b8; color: white; }
        .status-Settled { background: #28a745; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="/dashboard/">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-light btn-sm" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <h2>Financial Pledges</h2>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#pledgeModal" onclick="resetPledgeForm()">
                    <i class="fas fa-plus"></i> Add Pledge
                </button>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <div class="input-group mb-3">
                    <select id="statusFilter" class="form-select" style="max-width: 150px;">
                        <option value="">All Status</option>
                        <option value="Unpaid">Unpaid</option>
                        <option value="Partially Paid">Partially Paid</option>
                        <option value="Settled">Settled</option>
                    </select>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by member name...">
                    <button class="btn btn-primary" onclick="loadPledges()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <div id="pledgesList" class="row"></div>
    </div>

    <!-- Pledge Modal -->
    <div class="modal fade" id="pledgeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pledgeModalTitle">Add Pledge</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="pledgeForm">
                        <input type="hidden" id="pledgeId">
                        <div class="mb-3">
                            <label class="form-label">Member *</label>
                            <select id="pledgeMemberId" class="form-select" required>
                                <option value="">Select Member</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Amount Promised (₱) *</label>
                            <input type="number" id="amountPromised" class="form-control" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Due Date *</label>
                            <input type="date" id="dueDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="pledgeDescription" class="form-control" rows="2"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="savePledge()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentStatusFilter = '';
        let currentPledgeSearch = '';
        
        async function loadMembersForPledge() {
            try {
                const response = await fetch('/api/members/');
                if (response.ok) {
                    const members = await response.json();
                    const select = document.getElementById('pledgeMemberId');
                    select.innerHTML = '<option value="">Select Member</option>' + 
                        members.map(m => `<option value="${m.id}">${m.full_name}</option>`).join('');
                }
            } catch (error) {
                console.error('Error loading members:', error);
            }
        }
        
        async function loadPledges() {
            currentStatusFilter = document.getElementById('statusFilter').value;
            currentPledgeSearch = document.getElementById('searchInput').value;
            
            let url = '/api/pledges/';
            const params = [];
            if (currentStatusFilter) params.push(`status=${currentStatusFilter}`);
            if (currentPledgeSearch) params.push(`member__first_name__icontains=${currentPledgeSearch}&member__last_name__icontains=${currentPledgeSearch}`);
            if (params.length) url += '?' + params.join('&');
            
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const pledges = await response.json();
                    renderPledges(pledges);
                }
            } catch (error) {
                console.error('Error loading pledges:', error);
            }
        }
        
        function renderPledges(pledges) {
            const container = document.getElementById('pledgesList');
            if (pledges.length === 0) {
                container.innerHTML = '<div class="col-12 text-center">No pledges found</div>';
                return;
            }
            
            container.innerHTML = pledges.map(pledge => `
                <div class="col-md-6">
                    <div class="pledge-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5>${pledge.member_name || pledge.member}</h5>
                            <span class="status-badge status-${pledge.status.replace(' ', '\\ ')}">${pledge.status}</span>
                        </div>
                        <p><strong>Amount:</strong> ₱${parseFloat(pledge.amount_promised).toLocaleString()}</p>
                        <p><strong>Due Date:</strong> ${pledge.due_date}</p>
                        <p><strong>Balance:</strong> ₱${parseFloat(pledge.balance).toLocaleString()}</p>
                        <p><strong>Total Paid:</strong> ₱${parseFloat(pledge.total_paid || 0).toLocaleString()}</p>
                        ${pledge.description ? `<p><strong>Description:</strong> ${pledge.description}</p>` : ''}
                        <div class="mt-2">
                            <button class="btn btn-sm btn-success" onclick="addPayment(${pledge.id})">
                                <i class="fas fa-money-bill-wave"></i> Add Payment
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="editPledge(${pledge.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deletePledge(${pledge.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                            <button class="btn btn-sm btn-info" onclick="viewPayments(${pledge.id})">
                                <i class="fas fa-history"></i> Payments
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function resetPledgeForm() {
            document.getElementById('pledgeForm').reset();
            document.getElementById('pledgeId').value = '';
            document.getElementById('pledgeModalTitle').textContent = 'Add Pledge';
        }
        
        async function savePledge() {
            const pledgeData = {
                member: document.getElementById('pledgeMemberId').value,
                amount_promised: document.getElementById('amountPromised').value,
                due_date: document.getElementById('dueDate').value,
                description: document.getElementById('pledgeDescription').value
            };
            
            const id = document.getElementById('pledgeId').value;
            let response;
            
            try {
                if (id) {
                    response = await fetch(`/api/pledges/${id}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(pledgeData)
                    });
                } else {
                    response = await fetch('/api/pledges/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(pledgeData)
                    });
                }
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('pledgeModal')).hide();
                    loadPledges();
                } else {
                    const error = await response.json();
                    alert('Error: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error saving pledge:', error);
                alert('Error saving pledge');
            }
        }
        
        async function editPledge(id) {
            try {
                const response = await fetch(`/api/pledges/${id}/`);
                if (response.ok) {
                    const pledge = await response.json();
                    document.getElementById('pledgeId').value = pledge.id;
                    document.getElementById('pledgeMemberId').value = pledge.member;
                    document.getElementById('amountPromised').value = pledge.amount_promised;
                    document.getElementById('dueDate').value = pledge.due_date;
                    document.getElementById('pledgeDescription').value = pledge.description || '';
                    document.getElementById('pledgeModalTitle').textContent = 'Edit Pledge';
                    
                    new bootstrap.Modal(document.getElementById('pledgeModal')).show();
                }
            } catch (error) {
                console.error('Error loading pledge:', error);
            }
        }
        
        async function deletePledge(id) {
            if (confirm('Are you sure you want to delete this pledge? All associated payments will also be deleted.')) {
                try {
                    const response = await fetch(`/api/pledges/${id}/`, {
                        method: 'DELETE',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        }
                    });
                    if (response.ok) {
                        loadPledges();
                    } else {
                        alert('Error deleting pledge');
                    }
                } catch (error) {
                    console.error('Error deleting pledge:', error);
                }
            }
        }
        
        function addPayment(pledgeId) {
            window.location.href = `/payments/?pledge=${pledgeId}`;
        }
        
        function viewPayments(pledgeId) {
            window.location.href = `/payments/?pledge=${pledgeId}`;
        }
        
        async function logout() {
            await fetch('/api/logout/', { method: 'POST' });
            window.location.href = '/login/';
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        loadMembersForPledge();
        loadPledges();
        
        document.getElementById('statusFilter').addEventListener('change', loadPledges);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loadPledges();
        });
    </script>
</body>
</html>
